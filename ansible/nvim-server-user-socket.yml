---
- name: Setup Neovim server as a user systemd service with socket activation
  hosts: nvim_hosts
  vars:
    nvim_user: "{{ ansible_user | default(ansible_env.USER) }}"
    nvim_listen_addr: "127.0.0.1:6667"
    nvim_cmd: "nvim --listen {{ nvim_listen_addr }} --cmd 'let g:neovide = v:true' --headless"
    nvim_service_name: "nvim-server"
    nvim_workdir: "%h"  # User's home directory
    nvim_systemd_user_dir: "/home/{{ nvim_user }}/.config/systemd/user"
  tasks:
    - name: Ensure systemd user directory exists
      file:
        path: "{{ nvim_systemd_user_dir }}"
        state: directory
        mode: "0700"
        owner: "{{ nvim_user }}"
        group: "{{ nvim_user }}"


    - name: Create nvim-server.service for user
      copy:
        dest: "{{ nvim_systemd_user_dir }}/{{ nvim_service_name }}.service"
        content: |
          [Unit]
          Description=Neovim headless server for remote Neovide
          After=network.target
          StartLimitIntervalSec=60
          StartLimitBurst=5

          [Service]
          Type=simple
          ExecStart={{ nvim_cmd }}
          WorkingDirectory={{ nvim_workdir }}
          Restart=always
          RestartSec=2
          Environment=PATH=/usr/local/bin:/usr/bin:/bin:$PATH

          [Install]
          WantedBy=default.target
        owner: "{{ nvim_user }}"
        group: "{{ nvim_user }}"
        mode: "0644"

    - name: Reload systemd user daemon
      become: false
      shell: |
        XDG_RUNTIME_DIR="/run/user/$(id -u {{ nvim_user }})" sudo -u {{ nvim_user }} systemctl --user daemon-reload

    - name: Enable nvim-server.service at login (user)
      become: false
      shell: |
        XDG_RUNTIME_DIR="/run/user/$(id -u {{ nvim_user }})" sudo -u {{ nvim_user }} systemctl --user enable {{ nvim_service_name }}.service

    - name: Start nvim-server.service (user)
      become: false
      shell: |
        XDG_RUNTIME_DIR="/run/user/$(id -u {{ nvim_user }})" sudo -u {{ nvim_user }} systemctl --user start {{ nvim_service_name }}.service
