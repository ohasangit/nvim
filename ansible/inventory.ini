# Equivalent manual SSH:
#
# Host X
#   User Y
#   HostName XX.XX.XX.X
#   CheckHostIP no
#   ServerAliveInterval 60
#   ServerAliveCountMax 5
#   TCPKeepAlive yes
#   ControlMaster auto
#   ControlPath ~/.ssh/cm-%C
#   ControlPersist 1h

; [nvim_hosts]
; X ansible_host=XX.XX.XX.X ansible_user=torc

; [nvim_hosts:vars]
; ansible_ssh_common_args='-o CheckHostIP=no -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -o TCPKeepAlive=yes -o ControlMaster=auto -o ControlPath=~/.ssh/cm-%C -o ControlPersist=1h'
